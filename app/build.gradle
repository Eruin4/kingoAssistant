apply plugin: "com.android.application"

android {
    namespace "com.example.homeassistantvoice"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.homeassistantvoice"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "androidx.recyclerview:recyclerview:1.3.2"
}
